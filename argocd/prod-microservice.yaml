apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prod-microservice
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Holuphilix/Gitops-Platform-Config.git
    targetRevision: main
    path: overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true